mail:
  email_account: ""
  email_auth_code: ""
  imap_server: ""
  smtp_server: ""
  imap_port: 993
  smtp_port: 465
  use_ssl: true
  smtp_starttls: false
  type: "auto"

filter:
  allowed_senders:
    - "******@***.com"
  subject_keywords:
    - "塔号"
    - "邮箱主题关键词"
  monitored_mast_ids: []
  attachment_extensions:
    - ".rld"
    - ".swift"
    - ".rwd"
    - ".dat"
    - ".zip"
    - ".txt"

rules:
  file_size_warning_kb: 20
  historical_size_warning_ratio: 0.8
  continuous_missing_warning_days: 2

report:
  send_time: "09:00"
  statistic_period: "previous_day_00_to_24"
  report_receivers: []
  report_cc: []
  generate_excel: true
  generate_html: true
  send_email: true

storage:
  data_dir: "./data"
  report_dir: "./reports"
  log_dir: "./logs"
  database_path: "./database/wind_mail_monitor.db"
